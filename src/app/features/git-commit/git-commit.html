<div class="grid h-full w-full grid-cols-12 gap-6 p-6 overflow-y-auto">
  <section
    class="col-span-7 flex flex-col rounded-xl border bg-card p-6 text-card-foreground shadow-sm"
  >
    <div class="mb-6 flex items-center justify-between">
      <h2 class="text-lg font-semibold tracking-tight uppercase text-primary">
        Commit Configuration
      </h2>
      <span class="text-xs font-mono text-muted-foreground bg-muted px-2 py-1 rounded"
        >Conventional Commits v1.0.0</span
      >
    </div>

    <form [formGroup]="commitForm" class="flex flex-col gap-6">
      <!-- Typ & Scope (Nebeneinander) -->
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-2">
          <!-- id und for verknüpfen Label und Input -->
          <label
            for="commit-type"
            class="text-xs font-semibold text-muted-foreground uppercase tracking-wider"
            >Type <span class="text-destructive">*</span></label
          >
          <select
            id="commit-type"
            formControlName="type"
            class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"
          >
            @for (t of commitTypes; track t.value) {
              <option [value]="t.value">{{ t.label }}</option>
            }
          </select>
        </div>

        <div class="flex flex-col gap-2">
          <label
            for="commit-scope"
            class="text-xs font-semibold text-muted-foreground uppercase tracking-wider"
            >Scope</label
          >
          <input
            id="commit-scope"
            type="text"
            formControlName="scope"
            placeholder="z.B. ui, auth, workspace"
            class="flex h-10 w-full font-mono rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"
          />
        </div>
      </div>

      <div class="flex flex-col gap-2 relative">
        <div class="flex justify-between items-center">
          <label
            for="commit-subject"
            class="text-xs font-semibold text-muted-foreground uppercase tracking-wider"
            >Subject <span class="text-destructive">*</span></label
          >

          <span
            class="text-xs font-mono font-medium"
            [class.text-destructive]="subjectLength > 72"
            [class.text-muted-foreground]="subjectLength <= 72"
          >
            {{ subjectLength }} / 72
          </span>
        </div>
        <input
          id="commit-subject"
          type="text"
          formControlName="subject"
          placeholder="Kurze, prägnante Beschreibung im Imperativ (z.B. add login button)"
          class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"
        />
      </div>

      <div class="flex flex-col gap-2">
        <label
          for="commit-body"
          class="text-xs font-semibold text-muted-foreground uppercase tracking-wider"
          >Body (Optional)</label
        >
        <textarea
          id="commit-body"
          formControlName="body"
          rows="5"
          placeholder="Detaillierte Erklärung der Änderungen. Warum wurde das gemacht? Was war das Problem?"
          class="flex min-h-[100px] w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2"
        ></textarea>
      </div>

      <label
        for="commit-breaking"
        class="flex items-center space-x-3 mt-2 rounded-lg border border-destructive/20 bg-destructive/5 p-4 transition-colors hover:bg-destructive/10 cursor-pointer"
      >
        <input
          id="commit-breaking"
          type="checkbox"
          formControlName="breaking"
          class="h-4 w-4 rounded border-gray-300 text-destructive focus:ring-destructive"
        />
        <div class="flex flex-col">
          <span class="text-sm font-semibold text-foreground">Breaking Change (!)</span>
          <span class="text-xs text-muted-foreground"
            >Markiert diesen Commit als Major-Release. Bricht Abwärtskompatibilität.</span
          >
        </div>
      </label>
    </form>
  </section>

  <section
    class="col-span-5 flex flex-col rounded-xl border bg-card text-card-foreground shadow-sm overflow-hidden relative"
  >
    <div class="flex items-center justify-between border-b border-border/50 bg-[#1e1e1e] px-4 py-3">
      <div class="flex items-center gap-2">
        <div class="flex gap-1.5">
          <div class="h-3 w-3 rounded-full bg-red-500/80"></div>
          <div class="h-3 w-3 rounded-full bg-yellow-500/80"></div>
          <div class="h-3 w-3 rounded-full bg-green-500/80"></div>
        </div>
        <span class="ml-2 text-xs font-mono tracking-wider text-muted-foreground"
          >bash — git-commit</span
        >
      </div>

      <button
        (click)="copyToClipboard()"
        [disabled]="commitForm.invalid"
        class="flex items-center gap-2 rounded bg-primary px-3 py-1.5 text-xs font-bold text-primary-foreground hover:bg-primary/90 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-[0_0_10px_rgba(var(--primary),0.3)]"
      >
        @if (copied()) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 6 9 17l-5-5" />
          </svg>
          COPIED!
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
          </svg>
          COPY COMMAND
        }
      </button>
    </div>

    <div class="flex-1 bg-[#0a0a0a] p-6 font-mono text-sm overflow-y-auto selection:bg-primary/30">
      <div class="flex text-muted-foreground opacity-50 mb-2">
        <span class="text-blue-400 mr-2">~/workspace</span> $ git commit -m "
      </div>

      <div class="whitespace-pre-wrap pl-6 text-green-400 leading-relaxed">
        {{ generatedCommit() }}
      </div>

      <div class="text-muted-foreground opacity-50 mt-2">"</div>

      <div class="mt-4 flex">
        <span class="text-blue-400 mr-2">~/workspace</span> $
        <span class="inline-block w-2 h-4 bg-muted-foreground ml-1 animate-pulse"></span>
      </div>
    </div>
  </section>
</div>

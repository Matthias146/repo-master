<div class="grid h-screen w-full grid-cols-12 gap-4 p-4" cdkDropListGroup>
  <aside
    class="col-span-3 flex flex-col rounded-xl border bg-card p-4 text-card-foreground shadow-sm"
  >
    <h2 class="mb-4 text-lg font-semibold tracking-tight">Bausteine</h2>

    <div
      cdkDropList
      [cdkDropListData]="availableBlocks"
      (cdkDropListDropped)="drop($event)"
      class="flex flex-1 flex-col gap-2 overflow-y-auto pr-1"
    >
      @for (block of availableBlocks; track block) {
        <div
          cdkDrag
          class="cursor-grab rounded-md border bg-muted/50 p-3 text-sm font-medium hover:bg-muted active:cursor-grabbing transition-colors"
        >
          {{ block.name }}
        </div>
      }
    </div>

    <button
      (click)="addCustomBlock()"
      class="mt-4 flex w-full items-center justify-center gap-2 rounded-md border-2 border-dashed border-muted bg-transparent p-3 text-sm font-medium text-muted-foreground hover:border-primary/50 hover:bg-primary/5 hover:text-primary transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M5 12h14" />
        <path d="M12 5v14" />
      </svg>
      Eigener Baustein
    </button>
  </aside>

  <section
    class="col-span-4 flex flex-col rounded-xl border bg-card p-4 text-card-foreground shadow-sm"
  >
    <h2 class="mb-4 text-lg font-semibold tracking-tight">Editor</h2>

    <div
      class="relative flex flex-col rounded-lg border-2 border-dashed border-muted bg-muted/10 overflow-hidden transition-all"
      [class.flex-1]="!activeBlock"
      [class.h-1/2]="activeBlock"
    >
      @if (selectedBlocks.length === 0) {
        <div
          class="absolute inset-0 flex flex-col items-center justify-center gap-3 text-muted-foreground opacity-60"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="40"
            height="40"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
            />
            <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
            <line x1="12" y1="22.08" x2="12" y2="12" />
          </svg>
          <p class="text-sm font-medium">Bausteine hier ablegen</p>
        </div>
      }

      <div
        cdkDropList
        [cdkDropListData]="selectedBlocks"
        (cdkDropListDropped)="drop($event)"
        class="absolute inset-0 z-10 flex flex-col gap-3 p-4 overflow-y-auto"
      >
        @for (block of selectedBlocks; track block) {
          <div
            cdkDrag
            [class.ring-2]="activeBlock === block"
            [class.ring-primary]="activeBlock === block"
            class="group rounded-lg border border-primary/20 bg-primary/5 p-3 shadow-sm hover:bg-primary/10 cursor-grab active:cursor-grabbing transition-all flex items-center justify-between"
          >
            <div class="flex items-center gap-3">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="text-muted-foreground"
              >
                <circle cx="9" cy="12" r="1" />
                <circle cx="9" cy="5" r="1" />
                <circle cx="9" cy="19" r="1" />
                <circle cx="15" cy="12" r="1" />
                <circle cx="15" cy="5" r="1" />
                <circle cx="15" cy="19" r="1" />
              </svg>
              <span class="text-sm font-medium text-foreground transition-colors">{{
                block.name
              }}</span>
            </div>

            <div
              class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity relative z-20"
            >
              <button
                (click)="selectBlock(block)"
                title="Bearbeiten"
                class="rounded-md p-1.5 text-muted-foreground hover:bg-primary/20 hover:text-primary focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring transition-all"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"
                  />
                  <path d="m15 5 4 4" />
                </svg>
              </button>
              <button
                (click)="removeBlock(block, $event)"
                title="Entfernen"
                class="rounded-md p-1.5 text-muted-foreground hover:bg-destructive/10 hover:text-destructive focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring transition-all"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M3 6h18" />
                  <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                  <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                  <line x1="10" y1="11" x2="10" y2="17" />
                  <line x1="14" y1="11" x2="14" y2="17" />
                </svg>
              </button>
            </div>
          </div>
        }
      </div>
    </div>

    @if (activeBlock) {
      <div
        class="mt-4 flex flex-1 flex-col overflow-hidden rounded-lg border bg-background shadow-sm ring-1 ring-border/50"
      >
        <div class="flex items-center justify-between border-b bg-muted/40 px-3 py-2">
          <div class="flex flex-1 items-center gap-2 mr-4">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="text-primary shrink-0"
            >
              <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
              <polyline points="14 2 14 8 20 8" />
            </svg>

            <input
              type="text"
              [formControl]="nameControl"
              class="flex-1 bg-transparent px-1 py-0.5 text-xs font-medium text-foreground focus-visible:outline-none border-b border-transparent focus-visible:border-primary/50 transition-colors"
              placeholder="Baustein Name"
            />

            <span class="text-xs font-medium text-muted-foreground shrink-0">.md</span>
          </div>

          <button
            (click)="activeBlock = null"
            class="rounded-md p-1 text-muted-foreground hover:bg-muted hover:text-foreground transition-colors shrink-0"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
        <textarea
          [formControl]="markdownControl"
          class="flex-1 w-full resize-none border-none bg-background px-4 py-3 text-sm text-foreground/90 focus-visible:outline-none font-mono placeholder:text-muted-foreground/50"
          placeholder="Markdown Code hier eingeben..."
        ></textarea>
      </div>
    }
  </section>

  <section
    class="col-span-5 rounded-xl border bg-card p-4 text-card-foreground shadow-sm flex flex-col relative"
  >
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold tracking-tight">Live Vorschau</h2>

      <button
        hlmBtn
        variant="outline"
        size="sm"
        (click)="copyToClipboard()"
        [class.border-green-500]="copied"
        [class.text-green-500]="copied"
        [disabled]="selectedBlocks.length === 0"
        class="gap-1.5 transition-all"
      >
        @if (copied) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="h-4 w-4 text-green-500"
          >
            <path d="M20 6 9 17l-5-5" />
          </svg>
          Kopiert!
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="h-4 w-4"
          >
            <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
          </svg>
          Markdown Kopieren
        }
      </button>
    </div>

    <div class="flex-1 overflow-y-auto rounded-lg bg-muted/20 p-6 pr-3">
      <markdown [data]="generatedMarkdown" class="prose prose-sm dark:prose-invert max-w-none">
      </markdown>
    </div>
  </section>
</div>

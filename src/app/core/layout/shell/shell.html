<div class="flex h-screen w-full bg-background text-foreground overflow-hidden">
  <aside class="flex w-16 flex-col items-center border-r bg-muted/10 py-4 z-20">
    <div
      class="mb-8 flex h-10 w-10 items-center justify-center rounded-lg bg-primary/10 text-primary"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="m8 3 4 8 5-5 5 15H2L8 3z" />
      </svg>
    </div>

    <nav class="flex flex-1 flex-col gap-4">
      <a
        routerLink="/readme"
        routerLinkActive="bg-primary/20 text-primary border-r-2 border-primary"
        class="flex h-10 w-10 items-center justify-center rounded-md text-muted-foreground transition-colors hover:bg-muted hover:text-foreground"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
          <line x1="3" y1="9" x2="21" y2="9" />
          <line x1="9" y1="21" x2="9" y2="9" />
        </svg>
      </a>

      <a
        routerLink="/commits"
        routerLinkActive="bg-primary/20 text-primary border-r-2 border-primary"
        class="flex h-10 w-10 items-center justify-center rounded-md text-muted-foreground transition-colors hover:bg-muted hover:text-foreground"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"
          />
          <path d="M9 18c-4.51 2-5-2-7-2" />
        </svg>
      </a>
    </nav>
  </aside>

  <div class="flex flex-1 flex-col overflow-hidden relative">
    <header
      class="flex h-14 items-center justify-between border-b bg-background/95 px-6 backdrop-blur z-10"
    >
      <div class="flex items-center gap-2 text-sm font-medium">
        <span class="text-primary">Dev_Protocol</span>
        <span class="text-muted-foreground">/</span>
        <span class="text-foreground">Workspace</span>
      </div>

      <div class="hidden max-w-md flex-1 items-center md:flex mx-8">
        <div
          class="flex w-full items-center rounded-md border border-input bg-muted/30 focus-within:ring-2 focus-within:ring-primary focus-within:border-primary transition-all overflow-hidden shadow-sm"
        >
          <div class="pl-3 pr-2 text-muted-foreground">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"
              />
              <path d="M9 18c-4.51 2-5-2-7-2" />
            </svg>
          </div>

          <input
            type="text"
            [formControl]="repoControl"
            (keyup.enter)="triggerScan()"
            placeholder="GitHub Repo (z.B. angular/angular)"
            class="w-full bg-transparent px-2 py-2 text-sm focus-visible:outline-none placeholder:text-muted-foreground font-mono"
          />

          <button
            (click)="triggerScan()"
            [disabled]="!repoControl.value"
            class="bg-primary/10 px-4 py-2 text-xs font-bold text-primary hover:bg-primary hover:text-primary-foreground disabled:opacity-50 transition-colors border-l border-input"
          >
            @if (isScanning()) {
              <span class="flex gap-1">
                <span
                  class="h-1.5 w-1.5 rounded-full bg-current animate-bounce"
                  style="animation-delay: 0ms"
                ></span>
                <span
                  class="h-1.5 w-1.5 rounded-full bg-current animate-bounce"
                  style="animation-delay: 150ms"
                ></span>
                <span
                  class="h-1.5 w-1.5 rounded-full bg-current animate-bounce"
                  style="animation-delay: 300ms"
                ></span>
              </span>
            } @else {
              SCAN
            }
          </button>
        </div>
      </div>

      <div class="flex items-center gap-4">
        @if (supabase.session()) {
          <div class="flex items-center gap-3">
            <img
              [src]="supabase.session()?.user?.user_metadata?.['avatar_url']"
              alt="Avatar"
              class="h-8 w-8 rounded-full border border-border"
            />
            <button
              (click)="logout()"
              class="text-xs font-semibold text-muted-foreground hover:text-foreground transition-colors"
            >
              Logout
            </button>
          </div>
        } @else {
          <button
            (click)="login()"
            class="flex items-center gap-2 rounded-md bg-primary text-primary-foreground px-4 py-2 text-sm font-semibold transition-colors hover:bg-primary/90"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
              />
            </svg>
            Login
          </button>
        }
      </div>
    </header>

    <main class="flex-1 overflow-hidden bg-muted/5">
      <router-outlet></router-outlet>
    </main>
    <footer class="flex justify-center gap-6 p-4 text-sm text-muted-foreground border-t">
      <a routerLink="/impressum" class="hover:text-primary transition-colors">Impressum</a>
      <a routerLink="/datenschutz" class="hover:text-primary transition-colors">Datenschutz</a>
    </footer>
  </div>
</div>
